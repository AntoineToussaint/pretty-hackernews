name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build the standalone web reader (the "/demo" taste of the extension).
      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json

      - name: Build web demo
        run: bunx vite build --base=/pretty-hackernews/demo/

      # Assemble the published site: landing page at root, demo at /demo.
      - name: Assemble site
        run: |
          mkdir -p _site/demo _site/assets
          cp site/index.html _site/index.html
          cp public/privacy.html _site/privacy.html
          cp store-assets/*.png _site/assets/ 2>/dev/null || true
          cp -r dist/* _site/demo/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
