<!doctype html>
<html lang="en" class="theme-hatch">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Hatch — a calmer Hacker News</title>
    <meta
      name="description"
      content="A modern, minimal, fast reader for Hacker News."
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var allowed = ["hatch", "mist", "forest", "paper", "mono"];
          if (allowed.indexOf(t) !== -1) {
            document.documentElement.classList.remove("theme-hatch");
            document.documentElement.classList.add("theme-" + t);
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
